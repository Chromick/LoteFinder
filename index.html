<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#166a5b" />
    <title>LoteFinder Itaipuaçu</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Manutenção de fibra</p>
          <h1>LoteFinder Itaipuaçu</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden title="Instalar app" aria-label="Instalar app">
          +
        </button>
      </header>

      <section class="search-panel" aria-label="Busca de endereço">
        <label for="streetInput">Rua atual no Maps</label>
        <input id="streetInput" list="streetList" autocomplete="street-address" placeholder="Ex.: Rua Professor Cardoso de Menezes" />
        <datalist id="streetList"></datalist>

        <div class="field-grid">
          <div>
            <label for="blockInput">Quadra</label>
            <input id="blockInput" inputmode="numeric" pattern="[0-9A-Za-z]*" placeholder="Ex.: 004" />
          </div>
          <div>
            <label for="lotInput">Lote</label>
            <input id="lotInput" inputmode="numeric" placeholder="Opcional" />
          </div>
        </div>

        <label for="noteInput">Referência</label>
        <input id="noteInput" placeholder="Portão, poste, caixa, cliente..." />

        <div class="actions">
          <button class="primary" id="mapsButton" type="button">Abrir no Google Maps</button>
          <button class="secondary" id="wazeButton" type="button">Waze</button>
        </div>
        <button class="wide-link" id="streetMapsButton" type="button">Consultar só a rua no Maps</button>
      </section>

      <section class="status-panel" aria-live="polite">
        <div id="resultStatus">Digite a rua e a quadra para preparar a rota.</div>
        <div class="suggestions" id="suggestions"></div>
      </section>

      <section class="saved-panel">
        <div class="section-title">
          <h2>Ponto correto</h2>
          <span id="savedBadge">0 salvos</span>
        </div>
        <p class="muted">Quando estiver na quadra certa, salve o GPS do telefone. Depois o app abre direto nesse ponto.</p>
        <div class="actions compact">
          <button class="secondary" id="saveGpsButton" type="button">Salvar GPS atual</button>
          <button class="ghost" id="copyQueryButton" type="button">Copiar busca</button>
        </div>
        <div class="saved-list" id="savedList"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
